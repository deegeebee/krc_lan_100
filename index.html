<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KRC | LAN#100 🎉</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #00ff9d;
    --accent2: #7f5af0;
    --bg: #0d0d12;
    --surface: #16161e;
    --surface2: #1e1e2a;
    --border: rgba(255,255,255,0.07);
    --text: #e8e8f0;
    --muted: #7a7a94;
    --font-head: 'Syne', sans-serif;
    --font-mono: 'Space Mono', monospace;
    --radius: 12px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Scanline overlay ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ── Header ── */
  header {
    text-align: center;
    padding: 3rem 1rem 2rem;
    position: relative;
  }

  .header-glow {
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 300px;
    background: radial-gradient(ellipse, rgba(127,90,240,0.18) 0%, transparent 70%);
    pointer-events: none;
  }

  .event-label {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 4px 14px;
    border-radius: 999px;
    margin-bottom: 1rem;
    animation: pulse-border 3s ease-in-out infinite;
  }

  @keyframes pulse-border {
    0%, 100% { box-shadow: 0 0 0 0 rgba(0,255,157,0); }
    50% { box-shadow: 0 0 12px 2px rgba(0,255,157,0.25); }
  }

  h1 {
    font-family: var(--font-head);
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 800;
    line-height: 1.1;
    background: linear-gradient(135deg, #ffffff 30%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.75rem;
  }

  .subtitle {
    font-size: 14px;
    color: var(--muted);
    max-width: 480px;
    margin: 0 auto;
    line-height: 1.7;
  }

  /* ── Counter strip ── */
  .counter-strip {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin: 1.5rem auto 0;
  }

  .counter-item {
    text-align: center;
  }

  .counter-num {
    font-family: var(--font-head);
    font-size: 2rem;
    font-weight: 800;
    color: var(--accent);
    display: block;
    line-height: 1;
  }

  .counter-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }

  /* ── Main layout ── */
  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 1rem 4rem;
  }

  /* ── Form ── */
  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.75rem;
    margin-bottom: 2.5rem;
    position: relative;
    overflow: hidden;
  }

  .form-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
  }

  .form-title {
    font-family: var(--font-head);
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .form-title .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    animation: blink 1.5s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .form-row {
    margin-bottom: 12px;
  }

  input, textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    transition: border-color 0.2s;
    outline: none;
    resize: none;
  }

  input::placeholder, textarea::placeholder {
    color: var(--muted);
  }

  input:focus, textarea:focus {
    border-color: var(--accent2);
  }

  textarea {
    min-height: 90px;
    margin-bottom: 12px;
  }

  .form-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .char-count {
    font-size: 12px;
    color: var(--muted);
  }

  .submit-btn {
    background: var(--accent);
    color: #0a0a10;
    border: none;
    border-radius: 8px;
    padding: 10px 24px;
    font-family: var(--font-head);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .submit-btn:hover { opacity: 0.9; }
  .submit-btn:active { transform: scale(0.98); }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .submit-btn .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #0a0a10;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Success toast ── */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent);
    color: #0a0a10;
    padding: 12px 24px;
    border-radius: 999px;
    font-family: var(--font-head);
    font-size: 14px;
    font-weight: 600;
    opacity: 0;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
    z-index: 1000;
    white-space: nowrap;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  /* ── Section header ── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
    gap: 10px;
  }

  .section-title {
    font-family: var(--font-head);
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .live-badge {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    background: rgba(0,255,157,0.12);
    color: var(--accent);
    padding: 3px 10px;
    border-radius: 999px;
    border: 1px solid rgba(0,255,157,0.3);
  }

  .export-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 14px;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 12px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .export-btn:hover { border-color: var(--accent2); color: var(--text); }

  /* ── Cards grid ── */
  .cards-grid {
    columns: 2;
    column-gap: 14px;
  }

  @media (max-width: 540px) {
    .cards-grid { columns: 1; }
  }

  .card {
    break-inside: avoid;
    margin-bottom: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.1rem 1.25rem;
    animation: cardIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card.new {
    border-color: rgba(0,255,157,0.3);
    box-shadow: 0 0 16px rgba(0,255,157,0.07);
  }

  .card-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-head);
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .card-name {
    font-family: var(--font-head);
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .card-time {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }

  .card-body {
    font-size: 13px;
    color: #b0b0c8;
    line-height: 1.75;
    word-break: break-word;
    overflow-wrap: anywhere;
  }

  .card-body.collapsed {
    display: -webkit-box;
    -webkit-line-clamp: 6;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .expand-btn {
    background: none;
    border: none;
    color: var(--accent2);
    font-family: var(--font-mono);
    font-size: 12px;
    cursor: pointer;
    padding: 4px 0 0 0;
    display: block;
  }

  .expand-btn:hover { opacity: 0.8; }

  /* ── Avatar colors ── */
  .av0 { background: rgba(127,90,240,0.2); color: #c4adff; }
  .av1 { background: rgba(0,255,157,0.15); color: #00ff9d; }
  .av2 { background: rgba(255,100,100,0.15); color: #ff8080; }
  .av3 { background: rgba(255,200,50,0.15); color: #ffd060; }
  .av4 { background: rgba(80,200,255,0.15); color: #60c8ff; }
  .av5 { background: rgba(255,120,200,0.15); color: #ff90d0; }

  /* ── Empty state ── */
  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.8;
  }

  .empty-state .big { font-size: 2.5rem; display: block; margin-bottom: 1rem; }

  /* ── Loading skeleton ── */
  .skeleton {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.1rem 1.25rem;
    margin-bottom: 14px;
    break-inside: avoid;
  }

  .skel-line {
    height: 12px;
    background: var(--surface2);
    border-radius: 6px;
    margin-bottom: 8px;
    animation: shimmer 1.5s ease-in-out infinite;
  }

  @keyframes shimmer {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.9; }
  }

  /* ── Admin panel (hidden by default) ── */
  #admin-panel {
    display: none;
    background: rgba(127,90,240,0.08);
    border: 1px solid rgba(127,90,240,0.3);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    margin-bottom: 1.5rem;
    font-size: 13px;
    color: var(--muted);
  }

  #admin-panel.visible { display: block; }
  #admin-panel strong { color: var(--accent2); }

  /* ── Error banner ── */
  .error-banner {
    background: rgba(255,80,80,0.1);
    border: 1px solid rgba(255,80,80,0.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: #ff8080;
    margin-bottom: 1rem;
    display: none;
  }

  .error-banner.visible { display: block; }
</style>
</head>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>
/* ── Initialisierung ── */
let sbClient;
let allComments = [];
let isAdmin = false;

document.addEventListener('DOMContentLoaded', () => {
  // Config auf Seite anwenden
  // Event-Delegation für Expand-Buttons in den Karten
  document.getElementById('cards-grid').addEventListener('click', e => {
    const btn = e.target.closest('.expand-btn');
    if (btn) toggleExpand(btn.dataset.card);
  });

  document.getElementById('lan-title').textContent    = CONFIG.LAN_NAME;
  document.getElementById('lan-subtitle').textContent = CONFIG.LAN_SUBTITLE;
  document.getElementById('years-num').textContent    = CONFIG.LAN_YEARS;

  // Zeichenzähler initialisieren
  const msgInput = document.getElementById('inp-msg');
  const charLeft = document.getElementById('char-left');
  charLeft.textContent = CONFIG.MSG_MAX_LENGTH;
  msgInput.setAttribute('maxlength', CONFIG.MSG_MAX_LENGTH);
  msgInput.addEventListener('input', function() {
    charLeft.textContent = CONFIG.MSG_MAX_LENGTH - this.value.length;
  });

  // Admin-Modus prüfen
  const params = new URLSearchParams(window.location.search);
  if (params.get('admin') === CONFIG.ADMIN_PASSWORD) {
    isAdmin = true;
    document.getElementById('admin-panel').classList.add('visible');
    document.getElementById('export-btn').style.display = 'flex';
    document.getElementById('export-btn-html').style.display = 'flex';
  }

  // Supabase-Config prüfen
  if (CONFIG.SUPABASE_URL === 'DEINE_SUPABASE_URL') {
    showError('form-error', '⚙️ Supabase noch nicht konfiguriert. Bitte SUPABASE_URL und SUPABASE_ANON im Code eintragen.');
    hideSkeleton();
    return;
  }

  sbClient = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON);
  loadComments();
  subscribeRealtime();
});

/* ── Kommentare laden ── */
async function loadComments() {
  const { data, error } = await sbClient
    .from('comments')
    .select('*')
    .order('created_at', { ascending: false });

  hideSkeleton();

  if (error) {
    showError('form-error', '⚠️ Konnte Kommentare nicht laden: ' + error.message);
    return;
  }

  allComments = data || [];
  renderAll();
}

/* ── Echtzeit-Abo ── */
function subscribeRealtime() {
  sbClient
    .channel('comments-channel')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'comments' }, payload => {
      allComments.unshift(payload.new);
      renderAll(payload.new.id);
      document.getElementById('count-num').textContent = allComments.length;
    })
    .subscribe();
}

/* ── Kommentar absenden ── */
async function submitComment() {
  const name = document.getElementById('inp-name').value.trim() || 'Anonym';
  const msg  = document.getElementById('inp-msg').value.trim();

  hideError('form-error');

  if (!msg) {
    showError('form-error', 'Bitte schreib einen Kommentar!');
    return;
  }

  setLoading(true);

  const { error } = await sbClient.from('comments').insert([{ name, message: msg }]);

  setLoading(false);

  if (error) {
    showError('form-error', '⚠️ Fehler beim Speichern: ' + error.message);
    return;
  }

  document.getElementById('inp-name').value = '';
  document.getElementById('inp-msg').value  = '';
  document.getElementById('char-left').textContent = CONFIG.MSG_MAX_LENGTH;

  showToast('✓ Gruß abgeschickt – danke!');
}

/* ── Alle Karten rendern ── */
function renderAll(newId = null) {
  const grid  = document.getElementById('cards-grid');
  const empty = document.getElementById('empty-state');

  if (allComments.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    document.getElementById('count-num').textContent = 0;
    return;
  }

  empty.style.display = 'none';
  document.getElementById('count-num').textContent = allComments.length;

  grid.innerHTML = allComments.map((c, i) =>
    buildCard(c, c.id === newId)
  ).join('');
}

/* ── Einzelne Karte bauen ── */
function buildCard(c, isNew) {
  const initials = (c.name || 'AN').slice(0, 2).toUpperCase();
  const avClass  = 'av' + (simpleHash(c.name || '') % 6);
  const timeStr  = relativeTime(c.created_at);
  const newCls   = isNew ? ' new' : '';
  const msg      = esc(c.message);
  const isLong   = (c.message || '').length > 500;
  const cardId   = 'card-' + (c.id || Math.random().toString(36).slice(2));

  return `
    <div class="card${newCls}" id="${cardId}">
      <div class="card-head">
        <div class="avatar ${avClass}">${initials}</div>
        <span class="card-name">${esc(c.name || 'Anonym')}</span>
        <span class="card-time">${timeStr}</span>
      </div>
      <p class="card-body${isLong ? ' collapsed' : ''}" id="body-${cardId}">${msg}</p>
      ${isLong ? `<button class="expand-btn" id="btn-${cardId}" data-card="${cardId}">▼ mehr anzeigen</button>` : ''}
    </div>`;
}

/* ── Expand/Collapse ── */
function toggleExpand(cardId) {
  const body = document.getElementById('body-' + cardId);
  const btn  = document.getElementById('btn-'  + cardId);
  if (body.classList.contains('collapsed')) {
    body.classList.remove('collapsed');
    btn.textContent = '▲ weniger anzeigen';
  } else {
    body.classList.add('collapsed');
    btn.textContent = '▼ mehr anzeigen';
  }
}

/* ── CSV-Export ── */
function exportCSV() {
  const rows = [['Name', 'Kommentar', 'Zeitstempel']];
  allComments.forEach(c => {
    rows.push([
      '"' + (c.name    || '').replace(/"/g, '""') + '"',
      '"' + (c.message || '').replace(/"/g, '""') + '"',
      '"' + (c.created_at || '') + '"'
    ]);
  });
  const csv  = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'lan-grüsse.csv';
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 100);
}

/* ── HTML-Export ── */
function exportHTML() {
  const lanName = CONFIG.LAN_NAME || 'LAN-Jubiläum';
  const now     = new Date().toLocaleDateString('de-DE', { day:'2-digit', month:'long', year:'numeric' });

  const cards = allComments.map(c => {
    const initials = (c.name || 'AN').slice(0, 2).toUpperCase();
    const time     = relativeTime(c.created_at);
    const msg      = (c.message || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\n/g,'<br>');
    const name     = (c.name || 'Anonym')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return `
      <div class="card">
        <div class="card-head">
          <div class="avatar">${initials}</div>
          <div>
            <div class="card-name">${name}</div>
            <div class="card-time">${time}</div>
          </div>
        </div>
        <div class="card-body">${msg}</div>
      </div>`;
  }).join('');

  const html = `<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>${lanName.replace(/</g,'&lt;')} – Grüße</title>
<style>
  body { font-family: Georgia, serif; background: #f5f5f5; color: #1a1a1a; margin: 0; padding: 2rem; }
  h1 { font-size: 2rem; text-align: center; margin-bottom: 0.25rem; }
  .meta { text-align: center; color: #888; font-size: 13px; margin-bottom: 2rem; font-family: monospace; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1rem; max-width: 1100px; margin: 0 auto; }
  .card { background: #fff; border: 1px solid #ddd; border-top: 3px solid #7f5af0; border-radius: 10px; padding: 1.25rem; break-inside: avoid; }
  .card-head { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .avatar { width: 38px; height: 38px; border-radius: 50%; background: #ede9fe; color: #5b21b6; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; flex-shrink: 0; font-family: sans-serif; }
  .card-name { font-weight: 700; font-size: 14px; font-family: sans-serif; }
  .card-time { font-size: 12px; color: #999; font-family: monospace; }
  .card-body { font-size: 14px; line-height: 1.75; color: #444; word-break: break-word; overflow-wrap: anywhere; }
  @media print {
    body { background: #fff; padding: 0.5rem; }
    .card { box-shadow: none; border: 1px solid #ccc; }
  }
</style>
</head>
<body>
  <h1>🎉 ${lanName.replace(/</g,'&lt;')}</h1>
  <p class="meta">Exportiert am ${now} &nbsp;·&nbsp; ${allComments.length} Grüße</p>
  <div class="grid">${cards}</div>
</body>
</html>`;

  const blob = new Blob([html], { type: 'text/html;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'lan-grüsse.html';
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 100);
}

/* ── Hilfsfunktionen ── */
function hideSkeleton() {
  ['skel1','skel2'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.remove();
  });
}

function setLoading(on) {
  const btn = document.getElementById('submit-btn');
  const sp  = document.getElementById('spinner');
  btn.disabled      = on;
  sp.style.display  = on ? 'block' : 'none';
  document.getElementById('btn-label').textContent = on ? 'Sende…' : 'Absenden ↗';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.add('visible');
}

function hideError(id) {
  document.getElementById(id).classList.remove('visible');
}

function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function simpleHash(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) h = (h * 31 + str.charCodeAt(i)) | 0;
  return Math.abs(h);
}

function relativeTime(iso) {
  if (!iso) return '';
  const diff = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (diff < 60)   return 'gerade eben';
  if (diff < 3600) return `vor ${Math.floor(diff/60)} Min.`;
  if (diff < 86400)return `vor ${Math.floor(diff/3600)} Std.`;
  return new Date(iso).toLocaleDateString('de-DE');
}
